<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MNHLLOKTY Game Hub</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
  text-align: center;
}

h1 {
  margin: 20px;
  font-size: 32px;
}

#search {
  width: 80%;
  max-width: 400px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  outline: none;
  margin-bottom: 20px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 15px;
  padding: 20px;
}

.game {
  background: #1a1a1a;
  padding: 20px;
  border-radius: 10px;
  cursor: pointer;
  transition: 0.2s;
}

.game:hover {
  background: #4a148c;
  transform: scale(1.05);
}

iframe {
  width: 100%;
  height: 100vh;
  border: none;
}
</style>
</head>

<body>

<h1>🎮 MNHLLOKTY Games</h1>

<input type="text" id="search" placeholder="Buscar juego..." onkeyup="filterGames()">

<div class="grid" id="gameGrid">
  <div class="game">Slope</div>
  <div class="game">Run 3</div>
  <div class="game">Moto X3M</div>
  <div class="game">Retro Bowl</div>
  <div class="game">Tunnel Rush</div>
  <div class="game">Drift Hunters</div>
  <div class="game">Basket Random</div>
  <div class="game">Soccer Random</div>
</div>

<script>
const games = {
  "Slope": "https://games.crazygames.com/en_US/slope/index.html",
  "Run 3": "https://games.crazygames.com/en_US/run-3/index.html",
  "Moto X3M": "https://games.crazygames.com/en_US/moto-x3m/index.html",
  "Retro Bowl": "https://games.crazygames.com/en_US/retro-bowl/index.html",
  "Tunnel Rush": "https://games.crazygames.com/en_US/tunnel-rush/index.html",
  "Drift Hunters": "https://games.crazygames.com/en_US/drift-hunters/index.html",
  "Basket Random": "https://games.crazygames.com/en_US/basket-random/index.html",
  "Soccer Random": "https://games.crazygames.com/en_US/soccer-random/index.html"
};

function loadEvents() {
  document.querySelectorAll(".game").forEach(el => {
    el.onclick = () => {
      const name = el.innerText;
      loadGame(games[name]);
    };
  });
}

function loadGame(url) {
  document.body.innerHTML = `
    <button onclick="location.reload()" style="position:fixed;top:10px;left:10px;padding:10px;background:#4a148c;color:white;border:none;border-radius:8px;">⬅ Volver</button>
    <iframe src="${url}"></iframe>
  `;
}

function filterGames() {
  const input = document.getElementById("search").value.toLowerCase();
  document.querySelectorAll(".game").forEach(el => {
    el.style.display = el.innerText.toLowerCase().includes(input) ? "block" : "none";
  });
}

loadEvents();
</script>

</body>
</html>
